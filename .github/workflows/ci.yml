name: Wacom Linux CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: 🛡️ Code Quality (Linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './'
          ignore_names: 'GUIA_WACOM_ZURDO.md'

  test:
    name: 🧪 Bash Unit Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bash coverage tools
        run: sudo apt-get update && sudo apt-get install -y kcov
      - name: Setup permissions
        run: chmod +x ./*.sh ./tests/*.sh
      - name: Run Logic Tests with Coverage
        run: |
          mkdir -p coverage
          kcov coverage ./tests/test_logic.sh
      - name: Run Verify Install Test
        run: ./tests/verify_install.sh || true
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  dashboard-build:
    name: 🖥️ Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      
      - name: Install dependencies
        working-directory: ./dashboard
        run: npm ci
      
      - name: TypeScript check
        working-directory: ./dashboard
        run: npm run typecheck
      
      - name: Build
        working-directory: ./dashboard
        run: npm run build

  dashboard-test:
    name: 🧪 Dashboard Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      
      - name: Install dependencies
        working-directory: ./dashboard
        run: npm ci
      
      - name: Run tests
        working-directory: ./dashboard
        run: npm test -- --run
